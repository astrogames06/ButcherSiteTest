<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ai.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/svg+xml" href="assets/logo.png?v=123">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <title>Papa Joes Butcher</title>
</head>
<body>
    <div id="navbar">
        <div id="logo">
            <img src="assets/logo.png" alt="logo">
        </div>
        <div id="navbar_links">
            <button>Home</button>
            <button>Location</button>
            <button>Menu</button>
            <button>Contact</button>
        </div>
    </div>

    <div id="butcher-images">
        <ul>
            <li><img data-aos="fade-up" src="assets/butcher/guywithsteak.png" alt="Guy With Steak"></li>
            <li><img data-aos="fade-up" src="assets/butcher/manbutcheringbones.png" alt="Man butchering bones"></li>
            <li><img data-aos="fade-up" src="assets/butcher/meathangingup.png" alt="Meat hanging up"></li>
            <li><img data-aos="fade-up" src="assets/butcher/oldmanwithsteak.png" alt="Old Man with steak"></li>
            <li><img data-aos="fade-up" src="assets/butcher/sectionofmeat.png" alt="Section of meat"></li>
            <li><img data-aos="fade-up" src="assets/butcher/duckhangingup.png" alt="Duck hanging up"></li>
            <li><img data-aos="fade-up" src="assets/butcher/salami.png" alt="salami"></li>
            <li><img data-aos="fade-up" src="assets/butcher/oldmanwithhotdogs.png" alt="Section of meat"></li>
            <li><img data-aos="fade-up" src="assets/butcher/duckhangingup.png" alt="Duck hanging up"></li>
            <li><img data-aos="fade-up" src="assets/butcher/tomahawk.png" alt="Old Man with steak"></li>
            <li><img data-aos="fade-up" src="assets/butcher/legofham.png" alt="Section of meat"></li>
            <li><img data-aos="fade-up" src="assets/butcher/lambhung.png" alt="Duck hanging up"></li>
        </ul>
    </div>

    <center>
        <button id="instagram-btn">
            <img src="assets/insta.svg" alt="instragram">
        </button>
    </center>

    <div id="ai-chat" class="close-chat">
        <div class="ai-chat-title">
            <img src="assets/robot.svg" alt="robot">
            <p>AI Helper Chat</p>
        </div>

        <ul id="ai-chat-ul">

        </ul>
        
        <div class="ai-chat-inp-container">
            <input id="ai-chat-input" placeholder="Enter message to bot!">
            <img id="ai-send-btn" onclick="send_ai()" src="assets/up-arrow.svg" alt="up-arrow">
        </div>
    </div>
    <button onclick="openchat()" id="ai-btn">
        <img src="assets/robot.svg" alt="robot">
    </button>
   
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>
</body>
</html>
