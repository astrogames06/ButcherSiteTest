<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ai.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="page-styles/location.css">
    <link rel="icon" type="image/svg+xml" href="assets/logo.png?v=123">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <title>Papa Joes Butcher</title>
</head>
<body>
    <div id="navbar">
        <div id="logo">
            <img src="assets/logo.png" alt="logo">
        </div>
        <div id="navbar_links">
            <button><a href="/">Home</a></button>
            <button><a href="/about">About</a></button>
            <button><a href="/suppliers">Suppliers</a></button>
            <button><a href="/location">Location</a></button>
        </div>
    </div>

    <center>
        <button id="instagram-btn">
            <img src="assets/insta.svg" alt="instragram">
        </button>
    </center>

    <div id="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3312.588907752092!2d151.2699753761496!3d-33.87448391935412!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6b12adaf61ce4725%3A0x4e7a36b424c3191f!2sOporto%20Rose%20Bay!5e0!3m2!1sen!2sau!4v1773263524906!5m2!1sen!2sau" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    
    <div id="footer">
        <div id="location">
            <h1>Location</h1>
            33 Huffin Puffin Rd, Parramatta
        </div>
        <div id="hours">
            <h1>Hours</h1>
            Monday - Friday 8am - 6pm
            <br>
            <br>
            Saturday 8am - 3pm
            <br>
            <br>
            Sunday CLOSED
        </div>
        <div id="contact">
            <h1>Contact</h1>
            Ph: 02 4303 6723
            <br>
            <br>
            E: contact@papajoesbutcher.com.au
        </div>
    </div>

    <div id="ai-chat" class="close-chat">
        <div class="ai-chat-title">
            <img src="assets/robot.svg" alt="robot">
            <p>AI Helper Chat</p>
        </div>

        <ul id="ai-chat-ul">

        </ul>
        
        <div class="ai-chat-inp-container">
            <input id="ai-chat-input" placeholder="Enter message to bot!">
            <img id="ai-send-btn" onclick="send_ai()" src="assets/up-arrow.svg" alt="up-arrow">
        </div>
    </div>
    <button onclick="openchat()" id="ai-btn">
        <img src="assets/robot.svg" alt="robot">
    </button>
   
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>
</body>
</html>
